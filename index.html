<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звездная Продленка</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Космическая тема */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #1a0b2e, #4b1d52, #1a0b2e); 
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff; 
            padding: 20px; 
            margin: 0;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 { color: #f1c40f; text-align: center; margin-bottom: 5px; font-size: 3rem; text-shadow: 0 0 15px rgba(241, 196, 15, 0.5); margin-top: 0;}
        
        .header-panel { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            padding: 20px 30px; 
            border-radius: 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        #timer { 
            font-size: 3.5rem; font-weight: bold; color: #ff9ff3; 
            font-family: monospace; 
            background: rgba(0,0,0,0.3); 
            padding: 10px 25px; 
            border-radius: 15px; 
            border: 2px solid #ff9ff3;
            text-shadow: 0 0 10px #ff9ff3;
            box-shadow: 0 0 15px rgba(255, 159, 243, 0.2) inset;
        }
        
        .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end;}
        
        .controls button { 
            padding: 12px 20px; font-size: 1.1rem; cursor: pointer; border: none; 
            border-radius: 12px; font-weight: bold; color: white; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-add { background: linear-gradient(45deg, #0984e3, #74b9ff); }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(9, 132, 227, 0.4); }
        .btn-add-task { background: linear-gradient(45deg, #6c5ce7, #a29bfe); }
        .btn-add-task:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4); }
        .btn-reset { background: linear-gradient(45deg, #d35400, #e67e22); }
        .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(211, 84, 0, 0.4); }

        /* Структурированный список */
        .student-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .student-row {
            display: grid;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px 20px;
            transition: 0.3s;
        }
        .student-row:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.01);
        }

        .header-row {
            background: rgba(0, 0, 0, 0.4);
            font-weight: bold;
            color: #bdc3c7;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .col-center { text-align: center; }
        
        .student-name { font-weight: bold; font-size: 1.3rem; color: #fff; display: flex; align-items: center; justify-content: space-between;}
        .task-header { display: flex; align-items: center; justify-content: center; gap: 5px; }

        .rank-badge { display: inline-block; padding: 8px 15px; border-radius: 20px; font-size: 1rem; font-weight: bold; text-shadow: none;}
        
        /* Неоновые цвета званий */
        .rank-0 { background: #2d3436; color: #b2bec3; border: 1px solid #b2bec3;} 
        .rank-10 { background: rgba(0, 210, 211, 0.2); color: #00d2d1; border: 1px solid #00d2d1;} 
        .rank-20 { background: rgba(253, 203, 110, 0.2); color: #fdcb6e; border: 1px solid #fdcb6e;} 
        .rank-30 { background: rgba(255, 118, 117, 0.2); color: #ff7675; border: 1px solid #ff7675; box-shadow: 0 0 15px rgba(255, 118, 117, 0.5); } 

        .stars { font-size: 1.6rem; font-weight: bold; color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);}
        
        /* Кнопки удаления (крестики) */
        .btn-delete {
            background: none;
            border: none;
            color: #ff7675;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            opacity: 0.6;
            transition: 0.2s;
            line-height: 1;
        }
        .btn-delete:hover { opacity: 1; transform: scale(1.2) rotate(90deg); color: #ff4757; }

        /* Огромные ЗВЕЗДОЧКИ для пальцев */
        input[type="checkbox"] { 
            appearance: none;
            width: 45px; height: 45px; 
            cursor: pointer; 
            border: 3px solid #576574;
            border-radius: 10px;
            background: rgba(0,0,0,0.2);
            position: relative;
            transition: 0.3s;
            margin: 0 auto;
            display: block;
        }
        input[type="checkbox"]:hover {
            border-color: #f1c40f;
        }
        
        /* Потухшая звездочка по умолчанию */
        input[type="checkbox"]::after {
            content: '★';
            position: absolute;
            color: rgba(255, 255, 255, 0.1);
            font-size: 35px;
            top: 50%; left: 50%;
            transform: translate(-50%, -53%); 
            transition: 0.3s;
        }
        
        /* Загоревшаяся звездочка при нажатии */
        input[type="checkbox"]:checked {
            background: rgba(241, 196, 15, 0.1);
            border-color: #f1c40f;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
        }
        input[type="checkbox"]:checked::after {
            color: #f1c40f;
            text-shadow: 0 0 15px #f1c40f;
            transform: translate(-50%, -53%) scale(1.15); /* Немного увеличивается */
        }

        /* Анимация Взрыва в 18:00 */
        .explosion-mode { background: #c0392b !important; animation: shake 0.5s infinite; }
        .explosion-mode h1, .explosion-mode .student-name { color: white !important; text-shadow: 0 0 20px white;}
        .explosion-mode #timer { color: white; background: black; border-color: black; box-shadow: 0 0 30px black;}

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-2px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <div>
            <h1>🌟 Звездная Продленка</h1>
        </div>
        <div id="timer">--:--:--</div>
        <div class="controls">
            <button class="btn-add" onclick="addStudent()">+ Ученик</button>
            <button class="btn-add-task" onclick="addTask()">+ Предмет</button>
            <button class="btn-reset" onclick="resetDay()">🌅 Новый день</button>
        </div>
    </div>

    <div class="student-list">
        <div class="student-row header-row" id="headerRow">
            </div>
        <div id="listBody">
            </div>
    </div>

    <script>
        // Исходный список учеников
        const defaultStudents = [
            { name: "Белоцерковцев Лев", stars: 0, tasks: {} },
            { name: "Ельцов Елисей", stars: 0, tasks: {} },
            { name: "Ковалёва Кира", stars: 0, tasks: {} },
            { name: "Котлов Пётр", stars: 0, tasks: {} },
            { name: "Матушкин Георгий", stars: 0, tasks: {} },
            { name: "Новикова Ульяна", stars: 0, tasks: {} },
            { name: "Романова Елизавета", stars: 0, tasks: {} },
            { name: "Рустамова Анастасия", stars: 0, tasks: {} },
            { name: "Сапфиров Егор", stars: 0, tasks: {} },
            { name: "Стрельченко Андрей", stars: 0, tasks: {} },
            { name: "Тавлиди Вероника", stars: 0, tasks: {} },
            { name: "Усов Тимофей", stars: 0, tasks: {} }
        ];

        // Исходный список предметов
        const defaultTasks = [
            { id: 'math', name: 'Математика 📐' },
            { id: 'rus', name: 'Русский 📚' },
            { id: 'read', name: 'Чтение 📖' },
            { id: 'world', name: 'Окр. мир 🌍' },
            { id: 'clean', name: 'Уборка 🧹' }
        ];

        // Загружаем данные из хранилища
        let students = JSON.parse(localStorage.getItem('star_prodlenka_data_v2')) || defaultStudents;
        let tasksList = JSON.parse(localStorage.getItem('star_prodlenka_tasks_v2')) || defaultTasks;

        function getRankInfo(stars) {
            if (stars < 10) return { name: "🦥 Ленивец", class: "rank-0" };
            if (stars < 20) return { name: "🚶 Ученикус обыкновениус", class: "rank-10" };
            if (stars < 30) return { name: "🛠️ Трудяга", class: "rank-20" };
            return { name: "👑 Продлёникус легендариус", class: "rank-30" };
        }

        function saveData() {
            localStorage.setItem('star_prodlenka_data_v2', JSON.stringify(students));
            localStorage.setItem('star_prodlenka_tasks_v2', JSON.stringify(tasksList));
        }

        function renderList() {
            const listBody = document.getElementById('listBody');
            const headerRow = document.getElementById('headerRow');
            
            // Если учеников нет, скрываем шапку
            if (students.length === 0 && tasksList.length === 0) {
                headerRow.style.display = 'none';
                listBody.innerHTML = '<h2 style="text-align:center; color:#7f8fa6;">Нет учеников и предметов. Добавьте их!</h2>';
                return;
            } else {
                headerRow.style.display = 'grid';
            }

            // Динамическая настройка ширины колонок
            const gridTemplate = `2.5fr 1.5fr 1fr repeat(${tasksList.length}, 1fr)`;
            
            // Отрисовка шапки
            headerRow.style.gridTemplateColumns = gridTemplate;
            headerRow.innerHTML = `
                <div>Ученик</div>
                <div>Звание</div>
                <div class="col-center">Всего ⭐</div>
                ${tasksList.map(t => `
                    <div class="col-center task-header">
                        ${t.name}
                        <button class="btn-delete" title="Удалить предмет" onclick="deleteTask('${t.id}')">✖</button>
                    </div>
                `).join('')}
            `;

            // Отрисовка учеников
            listBody.innerHTML = '';
            students.forEach((student, index) => {
                const rank = getRankInfo(student.stars);
                if (!student.tasks) student.tasks = {};

                const row = document.createElement('div');
                row.className = 'student-row';
                row.style.gridTemplateColumns = gridTemplate;
                
                row.innerHTML = `
                    <div class="student-name">
                        ${student.name}
                        <button class="btn-delete" title="Удалить ученика" onclick="deleteStudent(${index})">✖</button>
                    </div>
                    <div><span class="rank-badge ${rank.class}">${rank.name}</span></div>
                    <div class="stars col-center">${student.stars}</div>
                    ${tasksList.map(task => `
                        <div class="col-center">
                            <input type="checkbox" 
                                   ${student.tasks[task.id] ? 'checked' : ''} 
                                   onchange="toggleTask(${index}, '${task.id}', this.checked)">
                        </div>
                    `).join('')}
                `;
                listBody.appendChild(row);
            });
        }

        function toggleTask(studentIndex, taskId, isChecked) {
            const student = students[studentIndex];
            
            student.tasks[taskId] = isChecked;
            if (isChecked) {
                student.stars += 1;
            } else {
                student.stars -= 1;
            }
            
            saveData();
            renderList();

            // Проверка на салют
            if (tasksList.length > 0) {
                const allDone = tasksList.every(t => student.tasks[t.id]);
                if (isChecked && allDone) {
                    fireConfetti();
                }
            }
        }

        function addStudent() {
            const name = prompt("Введите имя ученика:");
            if (name && name.trim() !== "") {
                students.push({
                    name: name.trim(),
                    stars: 0,
                    tasks: {}
                });
                saveData();
                renderList();
            }
        }

        function addTask() {
            const name = prompt("Введите название нового предмета (можно с эмодзи 🎨):");
            if (name && name.trim() !== "") {
                const newId = 'task_' + Date.now();
                tasksList.push({ id: newId, name: name.trim() });
                saveData();
                renderList();
            }
        }

        function deleteStudent(index) {
            const studentName = students[index].name;
            if (confirm(`Точно удалить ученика "${studentName}" из списка?`)) {
                students.splice(index, 1);
                saveData();
                renderList();
            }
        }

        function deleteTask(taskId) {
            const task = tasksList.find(t => t.id === taskId);
            if (confirm(`Точно удалить предмет "${task.name}" у всех учеников?`)) {
                tasksList = tasksList.filter(t => t.id !== taskId);
                students.forEach(s => {
                    if (s.tasks && s.tasks[taskId] !== undefined) {
                        delete s.tasks[taskId];
                    }
                });
                saveData();
                renderList();
            }
        }

        function resetDay() {
            if (confirm("Вы уверены? Звездочки снимутся, но заработанные очки рейтинга и звания сохранятся!")) {
                students.forEach(student => {
                    if(!student.tasks) student.tasks = {};
                    tasksList.forEach(task => {
                        student.tasks[task.id] = false;
                    });
                });
                saveData();
                renderList();
            }
        }

        function fireConfetti() {
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 8,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff9ff3', '#feca57', '#ff6b6b', '#48dbfb', '#1dd1a1']
                });
                confetti({
                    particleCount: 8,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff9ff3', '#feca57', '#ff6b6b', '#48dbfb', '#1dd1a1']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function updateTimer() {
            const now = new Date();
            const deadline = new Date();
            deadline.setHours(18, 0, 0, 0);

            const diff = deadline - now;
            const timerEl = document.getElementById('timer');

            if (diff <= 0) {
                timerEl.innerText = "ВРЕМЯ ВЫШЛО!";
                document.body.classList.add('explosion-mode');
                return;
            }

            document.body.classList.remove('explosion-mode');

            const h = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
            const m = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
            const s = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');

            timerEl.innerText = `${h}:${m}:${s}`;
        }

        renderList();
        setInterval(updateTimer, 1000);
        updateTimer();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звездная Продленка</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* СВЕТЛЫЙ ОПТИМИЗИРОВАННЫЙ CSS */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #ffffff; color: #333333; padding: 20px; margin: 0; min-height: 100vh; }
        h1 { color: #f39c12; text-align: center; font-size: 3rem; margin: 0 0 5px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        
        .header-panel { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; background: #f8f9fa; padding: 20px 30px; border-radius: 20px; border: 1px solid #e9ecef; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        #timer { font-size: 3rem; font-weight: bold; color: #e74c3c; font-family: monospace; background: #fff0f0; padding: 10px 20px; border-radius: 15px; border: 2px solid #ffcccc; }
        
        .controls button { padding: 12px 20px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 12px; font-weight: bold; color: white; margin-left: 5px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-add { background: #3498db; } .btn-task { background: #9b59b6; } .btn-reset { background: #e67e22; }
        .controls button:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        
        /* Сетка списка */
        .student-row { display: grid; align-items: center; background: #ffffff; border: 1px solid #e9ecef; border-radius: 15px; padding: 15px; margin-bottom: 10px; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .student-row:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.08); transform: translateY(-1px); border-color: #dee2e6; }
        .header-row { background: #f1f3f5; font-weight: bold; color: #495057; border: none; box-shadow: none; }
        .header-row:hover { box-shadow: none; transform: none; border-color: transparent; }
        
        .col-center { text-align: center; }
        .student-name { font-size: 1.3rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; color: #2c3e50; }
        
        .rank-badge { padding: 6px 14px; border-radius: 20px; font-size: 1rem; font-weight: bold; }
        .rank-0 { background: #f8f9fa; color: #adb5bd; border: 1px solid #dee2e6; } 
        .rank-10 { background: #e3fafc; color: #0c8599; border: 1px solid #99e9f2; } 
        .rank-20 { background: #fff3bf; color: #f08c00; border: 1px solid #ffec99; } 
        .rank-30 { background: #ffe3e3; color: #e03131; border: 1px solid #ffc9c9; box-shadow: 0 0 10px rgba(224, 49, 49, 0.2); }
        
        .stars { font-size: 1.6rem; color: #f1c40f; font-weight: bold; }
        .btn-delete { background: none; border: none; color: #fa5252; font-size: 1.2rem; cursor: pointer; opacity: 0.5; transition: 0.2s; }
        .btn-delete:hover { opacity: 1; transform: scale(1.2); color: #e03131; }
        
        /* Светлые чекбоксы-звездочки */
        input[type="checkbox"] { appearance: none; width: 45px; height: 45px; cursor: pointer; border: 2px solid #ced4da; border-radius: 12px; background: #f8f9fa; position: relative; margin: 0 auto; display: block; transition: 0.2s; }
        input[type="checkbox"]::after { content: '★'; position: absolute; color: #dee2e6; font-size: 32px; top: 50%; left: 50%; transform: translate(-50%, -53%); transition: 0.2s; }
        input[type="checkbox"]:hover { border-color: #adb5bd; }
        input[type="checkbox"]:checked { background: #fff9db; border-color: #f1c40f; box-shadow: 0 0 10px rgba(241,196,15,0.2); }
        input[type="checkbox"]:checked::after { color: #f1c40f; text-shadow: 0 0 5px rgba(241,196,15,0.4); transform: translate(-50%, -53%) scale(1.1); }

        .explosion-mode { background: #c0392b !important; animation: shake 0.5s infinite; }
        .explosion-mode h1, .explosion-mode .student-name, .explosion-mode .header-row { color: white !important; }
        .explosion-mode .student-row { background: transparent; border-color: rgba(255,255,255,0.3); }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-2px,2px); } 50% { transform: translate(2px,-2px); } 75% { transform: translate(-2px,-2px); } }
        #errorLog { display: none; background: #e74c3c; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; border: 2px solid #c0392b; }
    </style>
</head>
<body>

    <div id="errorLog"></div>

    <script>
        window.onerror = function(msg, url, line) {
            const log = document.getElementById('errorLog');
            log.style.display = 'block';
            log.innerHTML += `🛑 Системный сбой: ${msg} (Строка: ${line})<br>`;
            return false;
        };
    </script>

    <div class="header-panel">
        <h1>🌟 Звездная Продленка</h1>
        <div id="timer">--:--:--</div>
        <div class="controls">
            <button class="btn-add" onclick="app.addStudent()">+ Ученик</button>
            <button class="btn-task" onclick="app.addTask()">+ Предмет</button>
            <button class="btn-reset" onclick="app.resetDay()">🌅 Новый день</button>
        </div>
    </div>

    <div id="listBody"></div>

    <script>
        const app = {
            students: [],
            tasks: [],
            storageKeyData: 'sp_data_v4',
            storageKeyTasks: 'sp_tasks_v4',

            init() {
                this.loadData();
                this.render();
                setInterval(() => this.updateTimer(), 1000);
                this.updateTimer();
            },

            loadData() {
                try {
                    const s = localStorage.getItem(this.storageKeyData);
                    const t = localStorage.getItem(this.storageKeyTasks);
                    
                    this.students = s ? JSON.parse(s) : [
                        { name: "Белоцерковцев Лев", stars: 0, tasks: {} },
                        { name: "Ельцов Елисей", stars: 0, tasks: {} },
                        { name: "Ковалёва Кира", stars: 0, tasks: {} },
                        { name: "Котлов Пётр", stars: 0, tasks: {} },
                        { name: "Матушкин Георгий", stars: 0, tasks: {} },
                        { name: "Новикова Ульяна", stars: 0, tasks: {} },
                        { name: "Романова Елизавета", stars: 0, tasks: {} },
                        { name: "Рустамова Анастасия", stars: 0, tasks: {} },
                        { name: "Сапфиров Егор", stars: 0, tasks: {} },
                        { name: "Стрельченко Андрей", stars: 0, tasks: {} },
                        { name: "Тавлиди Вероника", stars: 0, tasks: {} },
                        { name: "Усов Тимофей", stars: 0, tasks: {} }
                    ];
                    
                    this.tasks = t ? JSON.parse(t) : [
                        { id: 't1', name: 'Математика 📐' },
                        { id: 't2', name: 'Русский 📚' },
                        { id: 't3', name: 'Чтение 📖' },
                        { id: 't4', name: 'Окр. мир 🌍' },
                        { id: 't5', name: 'Уборка 🧹' }
                    ];

                    if (!Array.isArray(this.students)) this.students = [];
                    if (!Array.isArray(this.tasks)) this.tasks = [];

                } catch (e) {
                    throw new Error("Сбой чтения памяти интерактивной панели");
                }
            },

            saveData() {
                localStorage.setItem(this.storageKeyData, JSON.stringify(this.students));
                localStorage.setItem(this.storageKeyTasks, JSON.stringify(this.tasks));
            },

            getRank(stars) {
                if (stars < 10) return { n: "🦥 Ленивец", c: "rank-0" };
                if (stars < 20) return { n: "🚶 Ученикус обыкновениус", c: "rank-10" };
                if (stars < 30) return { n: "🛠️ Трудяга", c: "rank-20" };
                return { n: "👑 Продлёникус легендариус", c: "rank-30" };
            },

            render() {
                const container = document.getElementById('listBody');
                if (this.students.length === 0 && this.tasks.length === 0) {
                    container.innerHTML = '<h2 style="text-align:center; color: #6c757d;">Нет данных. Добавьте учеников!</h2>';
                    return;
                }

                const gridConf = `2.5fr 1.5fr 1fr repeat(${this.tasks.length}, 1fr)`;
                let html = '';

                html += `<div class="student-row header-row" style="grid-template-columns: ${gridConf}">
                            <div>Ученик</div>
                            <div>Звание</div>
                            <div class="col-center">⭐</div>`;
                this.tasks.forEach(t => {
                    html += `<div class="col-center">
                                ${t.name} <button class="btn-delete" onclick="app.delTask('${t.id}')" title="Удалить предмет">✖</button>
                             </div>`;
                });
                html += `</div>`;

                this.students.forEach((s, idx) => {
                    if (!s.tasks) s.tasks = {}; 
                    const rank = this.getRank(s.stars || 0);
                    
                    html += `<div class="student-row" style="grid-template-columns: ${gridConf}">
                                <div class="student-name">
                                    ${s.name} <button class="btn-delete" onclick="app.delStudent(${idx})" title="Удалить ученика">✖</button>
                                </div>
                                <div><span class="rank-badge ${rank.c}">${rank.n}</span></div>
                                <div class="stars col-center">${s.stars || 0}</div>`;
                    
                    this.tasks.forEach(t => {
                        const checked = s.tasks[t.id] ? 'checked' : '';
                        html += `<div class="col-center">
                                    <input type="checkbox" ${checked} onchange="app.toggle(${idx}, '${t.id}', this.checked)">
                                 </div>`;
                    });
                    html += `</div>`;
                });

                container.innerHTML = html;
            },

            toggle(sIdx, tId, isChecked) {
                const s = this.students[sIdx];
                s.tasks[tId] = isChecked;
                s.stars = isChecked ? (s.stars + 1) : (s.stars - 1);
                
                this.saveData();
                this.render();

                if (isChecked && this.tasks.length > 0) {
                    const allDone = this.tasks.every(t => s.tasks[t.id]);
                    if (allDone && typeof confetti === 'function') {
                        confetti({ particleCount: 20, spread: 90, origin: { y: 0.6 } });
                    }
                }
            },

            addStudent() {
                const name = prompt("Имя ученика:");
                if (name && name.trim()) {
                    this.students.push({ name: name.trim(), stars: 0, tasks: {} });
                    this.saveData();
                    this.render();
                }
            },

            addTask() {
                const name = prompt("Название предмета:");
                if (name && name.trim()) {
                    this.tasks.push({ id: 't_' + Date.now(), name: name.trim() });
                    this.saveData();
                    this.render();
                }
            },

            delStudent(idx) {
                if (confirm(`Удалить "${this.students[idx].name}"?`)) {
                    this.students.splice(idx, 1);
                    this.saveData();
                    this.render();
                }
            },

            delTask(id) {
                const t = this.tasks.find(x => x.id === id);
                if (confirm(`Удалить предмет "${t.name}"?`)) {
                    this.tasks = this.tasks.filter(x => x.id !== id);
                    this.students.forEach(s => { if(s.tasks) delete s.tasks[id]; });
                    this.saveData();
                    this.render();
                }
            },

            resetDay() {
                if (confirm("Снять все звездочки? (Рейтинг сохранится)")) {
                    this.students.forEach(s => { s.tasks = {}; });
                    this.saveData();
                    this.render();
                }
            },

            updateTimer() {
                const now = new Date();
                const deadline = new Date();
                deadline.setHours(18, 0, 0, 0);
                const diff = deadline - now;
                const el = document.getElementById('timer');
                
                if (!el) return;
                
                if (diff <= 0) {
                    el.innerText = "ВРЕМЯ ВЫШЛО!";
                    document.body.classList.add('explosion-mode');
                    return;
                }
                
                document.body.classList.remove('explosion-mode');
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
                const m = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
                const s = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
                el.innerText = `${h}:${m}:${s}`;
            }
        };

        app.init();

    </script>
</body>
</html>
